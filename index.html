<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대환장 보스 레이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        
        /* 보스 피격 애니메이션 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake { animation: shake 0.5s; animation-iteration-count: 1; filter: drop-shadow(0 0 20px red); }

        /* 데미지 팝업 애니메이션 */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        .damage-popup {
            position: absolute;
            color: #ff3333;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 50;
        }

        /* 체력바 부드러운 전환 */
        #hp-fill { transition: width 0.3s ease-out; }
        
        /* 배틀 로그 스크롤바 */
        .battle-log::-webkit-scrollbar { width: 6px; }
        .battle-log::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div id="damage-container" class="fixed inset-0 pointer-events-none flex justify-center items-center"></div>

    <div class="w-full max-w-3xl bg-gray-900 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden flex flex-col h-[90vh]">
        
        <div class="relative p-8 flex flex-col items-center justify-center bg-gradient-to-b from-red-900/40 to-gray-900 h-2/5 border-b border-gray-700">
            <h1 class="title-font text-5xl text-red-500 mb-2 drop-shadow-lg" id="boss-sprite">👹 월요일의 악마</h1>
            <p class="text-gray-400 text-sm mb-6">"주말은 끝났다. 영원한 출근뿐이다..."</p>
            
            <div class="w-full max-w-md bg-gray-800 rounded-full h-6 border-2 border-gray-950 relative overflow-hidden">
                <div id="hp-fill" class="bg-gradient-to-r from-red-600 to-red-400 h-full w-full"></div>
                <div class="absolute inset-0 flex items-center justify-center text-xs font-bold text-white text-shadow">
                    <span id="hp-text">9999 / 9999</span>
                </div>
            </div>
        </div>

        <div id="log-container" class="flex-1 p-6 overflow-y-auto battle-log bg-gray-950/50 flex flex-col gap-4">
            <div class="text-center text-gray-500 text-sm">전투가 시작되었습니다. 세상에서 가장 어이없는 스킬을 입력해 공격하세요!</div>
        </div>

        <div class="p-4 bg-gray-800 flex gap-3 items-center">
            <input type="text" id="skill-input" placeholder="예: 야근하는 김대리의 분노 찬 샷건치기" 
                   class="flex-1 bg-gray-900 text-white px-4 py-3 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors text-lg"
                   onkeypress="if(event.key === 'Enter') castSkill()">
            <button id="attack-btn" onclick="castSkill()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-transform transform active:scale-95 disabled:opacity-50">
                스킬 시전!
            </button>
        </div>
    </div>

    <script>
        // ★★★ 여기에 본인의 Gemini API 키를 넣으세요 ★★★
        const GEMINI_API_KEY = "여기에_API_키를_입력하세요"; 
        
        let maxHp = 9999;
        let currentHp = 9999;

        async function castSkill() {
            const inputEl = document.getElementById('skill-input');
            const btnEl = document.getElementById('attack-btn');
            const skillName = inputEl.value.trim();

            if (!skillName) return;
            if (GEMINI_API_KEY === "여기에_API_키를_입력하세요") {
                alert("코드 내에 Gemini API 키를 먼저 입력해주세요!");
                return;
            }

            // UI 잠금
            inputEl.disabled = true;
            btnEl.disabled = true;
            btnEl.innerText = "영창 중...";
            
            addLog(`<span class="text-blue-400 font-bold">[플레이어]</span> "${skillName}" (을)를 준비합니다...`);

            try {
                // Gemini API 호출 (프롬프트 엔지니어링의 핵심)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: "user",
                            parts: [{ text: `
                                너는 게임의 데미지 판정 심판이야. 보스는 '월요일의 악마'야.
                                플레이어가 다음 이름의 스킬을 사용했어: "${skillName}"
                                
                                이 스킬의 이름이 얼마나 창의적이고 웃긴지, 월요일 퇴치에 어울리는지 평가해서 아래 JSON 형식으로만 딱 답변해. 마크다운(\`\`\`) 쓰지마.
                                {
                                    "damage": 데미지 수치 (1~3000 사이의 숫자. 어이없고 웃길수록 높게),
                                    "critical": 크리티컬 여부 (true 또는 false),
                                    "description": "이 스킬이 어떻게 발동되어 보스를 때렸는지 아주 오글거리고 코믹한 중계 멘트 (2문장 이내)"
                                }
                            `}]
                        }]
                    })
                });

                const data = await response.json();
                let resultText = data.candidates[0].content.parts[0].text;
                resultText = resultText.replace(/```json/g, "").replace(/```/g, "").trim(); // 마크다운 제거
                
                const result = JSON.parse(resultText);
                
                applyDamage(result.damage, result.critical, result.description, skillName);

            } catch (error) {
                console.error(error);
                addLog(`<span class="text-red-500">스킬 시전 실패! 마나가 꼬였습니다. (API 에러)</span>`);
            } finally {
                // UI 잠금 해제
                inputEl.value = '';
                inputEl.disabled = false;
                btnEl.disabled = false;
                btnEl.innerText = "스킬 시전!";
                inputEl.focus();
            }
        }

        function applyDamage(dmg, isCrit, desc, skillName) {
            let finalDmg = isCrit ? Math.floor(dmg * 1.5) : dmg;
            currentHp = Math.max(0, currentHp - finalDmg);
            
            // 보스 애니메이션 효과
            const bossEl = document.getElementById('boss-sprite');
            bossEl.classList.remove('shake');
            void bossEl.offsetWidth; // reflow
            bossEl.classList.add('shake');

            // 체력바 업데이트
            const hpPercent = (currentHp / maxHp) * 100;
            document.getElementById('hp-fill').style.width = `${hpPercent}%`;
            document.getElementById('hp-text').innerText = `${currentHp} / ${maxHp}`;

            // 데미지 팝업
            const popupArea = document.getElementById('damage-container');
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.innerText = isCrit ? `💥 CRITICAL! -${finalDmg}` : `-${finalDmg}`;
            if(isCrit) popup.style.color = '#ffaa00';
            popupArea.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);

            // 로그 추가
            const critText = isCrit ? `<span class="text-yellow-400 font-bold">[크리티컬!]</span>` : '';
            addLog(`
                <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-blue-500 shadow">
                    <div class="text-lg mb-1"><span class="text-blue-300 font-bold">${skillName}</span> 적중! ${critText} <span class="text-red-400 font-bold">(-${finalDmg})</span></div>
                    <div class="text-gray-300 italic text-sm">"${desc}"</div>
                </div>
            `);

            if (currentHp === 0) {
                setTimeout(() => {
                    addLog(`<div class="text-2xl font-bold text-yellow-400 text-center mt-4 border-y border-yellow-400 py-4">🎉 월요일의 악마가 처치되었습니다! 영원한 주말이 찾아옵니다! 🎉</div>`);
                    document.getElementById('attack-btn').disabled = true;
                    document.getElementById('skill-input').disabled = true;
                }, 500);
            }
        }

        function addLog(htmlString) {
            const container = document.getElementById('log-container');
            const logDiv = document.createElement('div');
            logDiv.innerHTML = htmlString;
            container.appendChild(logDiv);
            container.scrollTop = container.scrollHeight; // 자동 스크롤
        }
    </script>
</body>
</html>
